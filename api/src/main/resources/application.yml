spring:
  application:
    name: entry-level-java-challenge
  profiles:
    # Default to the 'local' profile which loads application-local.yml
    active: local

app:
  security:
    # In production, this must be supplied via the environment variable.
    # In local development, it is loaded securely from the gitignored application-local.yml.
    api-key: ${WEBHOOK_API_KEY}